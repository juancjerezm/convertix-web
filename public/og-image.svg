<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="40%" stop-color="#12121a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0070f3"/>
      <stop offset="100%" stop-color="#7928ca"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0070f3"/>
      <stop offset="50%" stop-color="#7928ca"/>
      <stop offset="100%" stop-color="#0070f3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Radial glow accents -->
  <circle cx="300" cy="200" r="300" fill="rgba(121,40,202,0.06)" filter="url(#glow)"/>
  <circle cx="900" cy="450" r="250" fill="rgba(0,112,243,0.05)" filter="url(#glow)"/>

  <!-- Decorative grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Logo mark -->
  <rect x="535" y="100" width="130" height="130" rx="30" fill="url(#brandGrad)" opacity="0.15"/>
  <text x="600" y="190" font-family="'Inter',Arial,sans-serif" font-size="80" font-weight="800" fill="url(#brandGrad)" text-anchor="middle">C</text>

  <!-- Main title -->
  <text x="600" y="310" font-family="'Inter',Arial,sans-serif" font-size="72" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-2">CONVERTIX WEB</text>

  <!-- Tagline -->
  <text x="600" y="370" font-family="'Inter',Arial,sans-serif" font-size="28" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="1">Páginas web que convierten</text>

  <!-- Accent line -->
  <rect x="450" y="410" width="300" height="4" rx="2" fill="url(#accentLine)" opacity="0.6"/>

  <!-- Bottom info -->
  <text x="600" y="500" font-family="'Inter',Arial,sans-serif" font-size="16" fill="rgba(255,255,255,0.25)" text-anchor="middle" letter-spacing="2">DISEÑO · DESARROLLO · CONVERSIÓN</text>

  <!-- Corner accent dots -->
  <circle cx="1100" cy="530" r="4" fill="rgba(0,112,243,0.3)"/>
  <circle cx="1130" cy="530" r="4" fill="rgba(121,40,202,0.3)"/>
</svg>
