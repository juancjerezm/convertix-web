<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0070f3"/>
      <stop offset="100%" stop-color="#7928ca"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Decorative grid lines -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>

  <!-- Radial glow accents -->
  <circle cx="200" cy="150" r="180" fill="rgba(121,40,202,0.06)" filter="url(#glow)"/>
  <circle cx="600" cy="450" r="150" fill="rgba(0,112,243,0.05)" filter="url(#glow)"/>

  <!-- Car icon placeholder -->
  <g transform="translate(400,240)" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2">
    <rect x="-160" y="-60" width="320" height="120" rx="12"/>
    <rect x="-100" y="-45" width="200" height="40" rx="6"/>
    <circle cx="-80" cy="60" r="30" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
    <circle cx="80" cy="60" r="30" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
    <rect x="-30" y="-20" width="60" height="70" rx="4"/>
  </g>

  <!-- Browser chrome dots -->
  <circle cx="30" cy="30" r="6" fill="#ff5f56" opacity="0.6"/>
  <circle cx="55" cy="30" r="6" fill="#ffbd2e" opacity="0.6"/>
  <circle cx="80" cy="30" r="6" fill="#27c93f" opacity="0.6"/>

  <!-- Title -->
  <text x="400" y="420" font-family="'Inter',Arial,sans-serif" font-size="48" font-weight="800" fill="url(#brandGrad)" text-anchor="middle" letter-spacing="-1">Autos JC</text>

  <!-- Subtitle -->
  <text x="400" y="465" font-family="'Inter',Arial,sans-serif" font-size="18" fill="rgba(255,255,255,0.4)" text-anchor="middle" letter-spacing="1">Galería de Vehículos</text>

  <!-- Bottom accent line -->
  <rect x="340" y="490" width="120" height="3" rx="1.5" fill="url(#brandGrad)" opacity="0.5"/>
</svg>
