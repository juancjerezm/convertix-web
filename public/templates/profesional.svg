<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0070f3"/>
      <stop offset="100%" stop-color="#7928ca"/>
    </linearGradient>
  </defs>

  <rect width="400" height="300" fill="url(#bgGrad)"/>

  <!-- Browser chrome -->
  <rect x="0" y="0" width="400" height="28" fill="rgba(255,255,255,0.03)"/>
  <circle cx="14" cy="14" r="4" fill="#ff5f56" opacity="0.5"/>
  <circle cx="28" cy="14" r="4" fill="#ffbd2e" opacity="0.5"/>
  <circle cx="42" cy="14" r="4" fill="#27c93f" opacity="0.5"/>

  <!-- Briefcase icon -->
  <g transform="translate(200,115)" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2">
    <rect x="-42" y="-25" width="84" height="55" rx="6"/>
    <rect x="-30" y="-45" width="60" height="25" rx="4"/>
    <rect x="-20" y="-35" width="40" height="8" rx="2"/>
  </g>

  <!-- Lines of text placeholder -->
  <g opacity="0.06" stroke="#fff" stroke-width="1.5">
    <line x1="130" y1="205" x2="270" y2="205"/>
    <line x1="150" y1="220" x2="250" y2="220"/>
  </g>

  <text x="200" y="210" font-family="'Inter',Arial,sans-serif" font-size="20" font-weight="700" fill="url(#brandGrad)" text-anchor="middle">Profesional</text>
  <text x="200" y="240" font-family="'Inter',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="1.5">PLANTILLA</text>
</svg>
